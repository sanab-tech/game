<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Собери идеальный десерт</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header__badge">Кондитерская мастерская</div>
      <h1 class="header__title">Собери идеальный десерт</h1>
      <p class="header__subtitle">Пройдите 5 простых шагов — и мы подберём десерт, который идеально подойдёт к вашему празднику</p>
    </header>

    <div class="progress" aria-label="Прогресс">
      <div class="progress__track">
        <div class="progress__fill" id="progressFill"></div>
      </div>
      <div class="progress__steps" id="progressSteps"></div>
    </div>

    <main class="main" id="main">
      <!-- Steps rendered by JS -->
    </main>

    <footer class="footer">
      <p>Индивидуальные торты и десерты на заказ</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
